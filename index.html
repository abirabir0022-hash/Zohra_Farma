<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সিরিয়াল বুকিং ফর্ম</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .input-group textarea {
            resize: vertical;
            height: 80px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #5c258d;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #431a66;
        }
        #message {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>সিরিয়াল বুকিং করুন</h2>
    
    <!-- আপনার নতুন গুগল ওয়েব অ্যাপ লিংক এখানে যুক্ত করা হয়েছে -->
    <form id="bookingForm" action="https://script.google.com/macros/s/AKfycbxUr3q3EVk47crOk_scbxdiOHdYChVRCeLkwQ9YSRecuD2SyAZm_bhNTjCV5Cs_smdA_Q/exec" method="POST">
        
        <div class="input-group">
            <label for="name">রোগীর নাম:</label>
            <input type="text" id="name" name="entry.2005620554" placeholder="রোগীর নাম লিখুন" required>
        </div>
        
        <div class="input-group">
            <label for="phone">মোবাইল নম্বর:</label>
            <input type="tel" id="phone" name="entry.1167997497" placeholder="মোবাইল নম্বর লিখুন" required>
        </div>
        
        <div class="input-group">
            <label for="problem">শারীরিক সমস্যা (সংক্ষেপে):</label>
            <textarea id="problem" name="entry.830358828" placeholder="আপনার সমস্যাটি সংক্ষেপে লিখুন" required></textarea>
        </div>
        
        <button type="submit" id="submitBtn">বুকিং নিশ্চিত করুন</button>
    </form>
    
    <div id="message"></div>
</div>

<script>
    const form = document.getElementById('bookingForm');
    const msgDiv = document.getElementById('message');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "প্রসেস হচ্ছে...";
        
        const formData = new FormData(form);
        
        fetch(form.action, {
            method: 'POST',
            body: formData
        })
        .then(response => {
            msgDiv.style.display = "block";
            msgDiv.style.color = "green";
            msgDiv.innerText = "আপনার সিরিয়ালটি সফলভাবে বুকড হয়েছে!";
            form.reset();
            btn.disabled = false;
            btn.innerText = "বুকিং নিশ্চিত করুন";
        })
        .catch(error => {
            msgDiv.style.display = "block";
            msgDiv.style.color = "red";
            msgDiv.innerText = "দুঃখিত, কোনো সমস্যা হয়েছে। আবার চেষ্টা করুন।";
            btn.disabled = false;
            btn.innerText = "বুকিং নিশ্চিত করুন";
        });
    });
</script>

</body>
</html>
