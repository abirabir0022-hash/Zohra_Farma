<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জোহরা ফার্মা - ওষুধ হোম ডেলিভারি</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <header class="bg-emerald-600 text-white shadow-md">
        <div class="container mx-auto px-4 py-8 text-center">
            <h1 class="text-4xl font-extrabold mb-2">জোহরা ফার্মা</h1>
            <p class="text-emerald-100">ওসমান অপু • আপনার বিশ্বস্ত স্বাস্থ্যসেবা অংশীদার</p>
            <div class="mt-4 inline-block bg-emerald-700 px-4 py-2 rounded-full text-sm font-semibold">
                <i class="fa-solid fa-truck-fast mr-2"></i> ৩ ঘণ্টার মধ্যে হোম ডেলিভারি!
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12 max-w-2xl">
        <div class="bg-white rounded-2xl shadow-lg border border-slate-100 p-8">
            <h3 class="text-xl font-bold mb-6 text-center">ওষুধের অর্ডার দিন</h3>
            <form id="orderForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold mb-2">আপনার নাম *</label>
                    <input type="text" id="name" required class="w-full p-3 rounded-xl border border-slate-200">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">মোবাইল নম্বর *</label>
                    <input type="tel" id="phone" required class="w-full p-3 rounded-xl border border-slate-200">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">প্রেসক্রিপশন আপলোড (ছবি) *</label>
                    <input type="file" id="file" accept="image/*" required class="w-full p-2 border border-slate-200 rounded-xl">
                </div>
                <button type="button" onclick="uploadData()" id="submitBtn" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl">অর্ডার কনফার্ম করুন</button>
            </form>
            <div id="status" class="mt-4 text-center font-bold hidden"></div>
        </div>
    </main>

    <script>
        function uploadData() {
            const file = document.getElementById('file').files[0];
            const reader = new FileReader();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            
            if(!file) { alert("একটি প্রেসক্রিপশনের ছবি আপলোড করুন"); return; }
            
            btn.disabled = true;
            btn.innerText = "আপলোড হচ্ছে...";

            reader.readAsDataURL(file);
            reader.onload = function() {
                const rawData = reader.result.split(',')[1];
                const obj = {
                    name: document.getElementById('name').value,
                    phone: document.getElementById('phone').value,
                    file: rawData,
                    filename: file.name,
                    mimetype: file.type
                };

                // আপনার নতুন লিংক এখানে বসানো হয়েছে
                fetch("https://script.google.com/macros/s/AKfycbwm7HfvLxX-p9Rd1l5y2PdTziYdXaafPQDDbNbmAeCoH-LWJ6wNAmCcgY22vZ0mjaO0ow/exec", {
                    method: "POST",
                    body: JSON.stringify(obj)
                }).then(res => res.text()).then(data => {
                    status.classList.remove('hidden');
                    status.innerText = "ধন্যবাদ! আপনার অর্ডারটি সফলভাবে গৃহীত হয়েছে।";
                    btn.innerText = "অর্ডার কনফার্ম করুন";
                    btn.disabled = false;
                    document.getElementById('orderForm').reset();
                });
            }
        }
    </script>
</body>
</html>
